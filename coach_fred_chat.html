<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coach Fred — Starts With You</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: #0f1f3d; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
  .chat-header { background: #0f1f3d; padding: 16px 20px; display: flex; align-items: center; gap: 14px; border-bottom: 1px solid rgba(255,255,255,0.08); flex-shrink: 0; }
  .header-avatar { width: 48px; height: 48px; border-radius: 50%; object-fit: cover; object-position: top; border: 2px solid rgba(244,112,27,0.5); flex-shrink: 0; }
  .header-name { font-family: 'Fraunces', serif; font-size: 1.1rem; font-weight: 700; color: white; line-height: 1; margin-bottom: 3px; }
  .header-status { font-size: 0.72rem; color: #4ade80; display: flex; align-items: center; gap: 5px; }
  .header-status::before { content: ''; width: 7px; height: 7px; border-radius: 50%; background: #4ade80; animation: pulse 2s infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
  .header-back { margin-left: auto; color: rgba(255,255,255,0.5); text-decoration: none; font-size: 0.8rem; font-weight: 500; border: 1px solid rgba(255,255,255,0.15); padding: 6px 14px; border-radius: 6px; transition: all 0.2s; }
  .header-back:hover { color: white; border-color: rgba(255,255,255,0.35); }
  .messages { flex: 1; overflow-y: auto; padding: 24px 20px; display: flex; flex-direction: column; gap: 16px; }
  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }
  .message { display: flex; flex-direction: column; max-width: 80%; }
  .message.fred { align-self: flex-start; }
  .message.student { align-self: flex-end; }
  .message-meta { font-size: 0.68rem; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; margin-bottom: 5px; color: rgba(255,255,255,0.4); }
  .student .message-meta { text-align: right; }
  .message-bubble { padding: 12px 16px; border-radius: 12px; font-size: 0.92rem; line-height: 1.65; }
  .fred .message-bubble { background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.9); border-radius: 4px 12px 12px 12px; }
  .student .message-bubble { background: #f4701b; color: white; border-radius: 12px 4px 12px 12px; }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: rgba(255,255,255,0.5); display: inline-block; margin: 0 2px; animation: bounce 1.2s infinite; }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%, 80%, 100% { transform: translateY(0); } 40% { transform: translateY(-6px); } }
  .starters { padding: 0 20px 16px; display: flex; gap: 8px; flex-wrap: wrap; flex-shrink: 0; }
  .starter-btn { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12); color: rgba(255,255,255,0.7); padding: 7px 14px; border-radius: 20px; font-size: 0.78rem; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all 0.2s; white-space: nowrap; }
  .starter-btn:hover { background: rgba(244,112,27,0.15); border-color: rgba(244,112,27,0.4); color: white; }
  .input-area { padding: 12px 20px 20px; flex-shrink: 0; border-top: 1px solid rgba(255,255,255,0.08); display: flex; gap: 10px; align-items: flex-end; }
  #userInput { flex: 1; background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.12); border-radius: 10px; padding: 12px 16px; color: white; font-family: 'DM Sans', sans-serif; font-size: 0.92rem; resize: none; height: 46px; max-height: 120px; outline: none; transition: border-color 0.2s; line-height: 1.5; }
  #userInput::placeholder { color: rgba(255,255,255,0.25); }
  #userInput:focus { border-color: rgba(244,112,27,0.5); }
  #sendBtn { background: #f4701b; border: none; border-radius: 10px; width: 46px; height: 46px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.2s; }
  #sendBtn:hover { background: #ff8c3a; transform: scale(1.05); }
  #sendBtn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
  #sendBtn svg { width: 18px; height: 18px; fill: white; }
</style>
</head>
<body>

<div class="chat-header">
  <img src="coachfred.jpg" alt="Coach Fred" class="header-avatar">
  <div>
    <div class="header-name">Coach Fred</div>
    <div class="header-status">Online</div>
  </div>
  <a href="https://www.startswithyouproject.com" class="header-back">← Back</a>
</div>

<div class="messages" id="messages"></div>

<div class="starters" id="starters">
  <button class="starter-btn" onclick="useStarter('I don\'t know what I want to do with my life.')">I don't know what I want</button>
  <button class="starter-btn" onclick="useStarter('How do I start saving money?')">How do I start saving?</button>
  <button class="starter-btn" onclick="useStarter('What does success actually mean?')">What is success?</button>
  <button class="starter-btn" onclick="useStarter('I feel stuck and don\'t know where to start.')">I feel stuck</button>
</div>

<div class="input-area">
  <textarea id="userInput" placeholder="Ask Coach Fred anything..." onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
  <button id="sendBtn" onclick="sendMessage()">
    <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg>
  </button>
</div>

<script>
  const conversationHistory = [];

  document.addEventListener('DOMContentLoaded', function() {
    addMessage('fred', "Good to have you here. I'm Coach Fred. I won't give you the answers — but I'll ask you the right questions. What's on your mind?");
  });

  function useStarter(text) {
    document.getElementById('starters').style.display = 'none';
    document.getElementById('userInput').value = text;
    sendMessage();
  }

  async function sendMessage() {
    const input = document.getElementById('userInput');
    const text = input.value.trim();
    if (!text) return;

    addMessage('student', text);
    input.value = '';
    autoResize(input);
    conversationHistory.push({ role: 'user', content: text });

    document.getElementById('sendBtn').disabled = true;
    const typingEl = showTyping();

    try {
      const response = await fetch('/.netlify/functions/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: conversationHistory })
      });

      const data = await response.json();
      if (data.error) throw new Error(data.error.message || data.error);

      const reply = data.content?.[0]?.text || 'Something went wrong. Try again.';
      conversationHistory.push({ role: 'assistant', content: reply });
      removeTyping(typingEl);
      addMessage('fred', reply);

    } catch (err) {
      removeTyping(typingEl);
      addMessage('fred', 'Something went wrong. Try again in a moment.');
      console.error(err);
    }

    document.getElementById('sendBtn').disabled = false;
    document.getElementById('userInput').focus();
  }

  function addMessage(sender, text) {
    const messages = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'message ' + sender;
    div.innerHTML = '<div class="message-meta">' + (sender === 'fred' ? 'Coach Fred' : 'You') + '</div><div class="message-bubble">' + text.replace(/\n/g, '<br>') + '</div>';
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
  }

  function showTyping() {
    const messages = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'message fred';
    div.innerHTML = '<div class="message-meta">Coach Fred</div><div class="message-bubble"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>';
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
    return div;
  }

  function removeTyping(el) { if (el) el.remove(); }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }
</script>
</body>
</html>
